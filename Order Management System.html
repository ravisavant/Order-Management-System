<<!DOCTYPE html>
<html>
<head>
    <title>Order Managment System</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        #loginDiv, #searchDiv, #detailsDiv { max-width: 500px; margin: auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
        input[type=text], input[type=password], select { width: 100%; padding: 10px; margin: 8px 0; box-sizing: border-box; }
        button { padding: 10px 20px; margin-top: 10px; }
        #result { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div id="loginDiv">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="loginMsg" style="color:red;"></p>
</div>

<div id="searchDiv" style="display:none;">
    <h2>Search Your Order</h2>
    <label for="searchType">Search Type:</label>
    <select id="searchType">
        <option value="orderId">Order ID</option>
        <option value="omsId">OMS ID</option>
    </select>
    <input type="text" id="searchValue" placeholder="Enter Order ID or OMS ID">
    <button onclick="searchOrder()">Search</button>
    <p id="searchMsg" style="color:red;"></p>
</div>

<div id="detailsDiv" style="display:none;">
    <h2>Order Details</h2>
    <p id="orderDetails"></p>
    <button onclick="backToSearch()">Back</button>
</div>

<script>
    // Dummy login credentials
    const USER = "testuser";
    const PASS = "1234";

    // Sample orders data
    const orders = [
        {orderId:"1234", omsId:"10101", status:"Created", brand:"KTM", country:"India"},
        {orderId:"5356", omsId:"10102", status:"Created", brand:"Yamaha", country:"USA"},
        {orderId:"4321", omsId:"10103", status:"Created", brand:"Honda", country:"Japan"},
        {orderId:"8765", omsId:"10104", status:"Created", brand:"Suzuki", country:"Germany"},
        {orderId:"9876", omsId:"10105", status:"Created", brand:"Bajaj", country:"India"},
        {orderId:"2468", omsId:"10106", status:"Not Created", brand:"KTM", country:"India"},
        {orderId:"1357", omsId:"10107", status:"Not Created", brand:"Yamaha", country:"USA"},
        {orderId:"1928", omsId:"10108", status:"Not Created", brand:"Honda", country:"Japan"},
        {orderId:"5555", omsId:"10109", status:"Not Created", brand:"Suzuki", country:"Germany"},
        {orderId:"1010", omsId:"10110", status:"Not Created", brand:"Bajaj", country:"India"}
    ];

    function login() {
        const user = document.getElementById("username").value;
        const pass = document.getElementById("password").value;
        if(user === USER && pass === PASS){
            document.getElementById("loginDiv").style.display = "none";
            document.getElementById("searchDiv").style.display = "block";
        } else {
            document.getElementById("loginMsg").innerText = "Invalid username or password!";
        }
    }

    function searchOrder() {
        const type = document.getElementById("searchType").value;
        const value = document.getElementById("searchValue").value.trim();
        const order = orders.find(o => (type === "orderId" ? o.orderId : o.omsId) === value);

        if(order){
            document.getElementById("searchDiv").style.display = "none";
            document.getElementById("detailsDiv").style.display = "block";
            document.getElementById("orderDetails").innerHTML = `
                <strong>Order ID:</strong> ${order.orderId}<br>
                <strong>OMS ID:</strong> ${order.omsId}<br>
                <strong>Status:</strong> ${order.status}<br>
                <strong>Brand:</strong> ${order.brand}<br>
                <strong>Country:</strong> ${order.country}<br>
            `;
        } else {
            document.getElementById("searchMsg").innerText = "Order not integrated ❌";
        }
    }

    function backToSearch() {
        document.getElementById("detailsDiv").style.display = "none";
        document.getElementById("searchDiv").style.display = "block";
        document.getElementById("searchValue").value = "";
        document.getElementById("searchMsg").innerText = "";
    }
</script>

</body>
</html>
